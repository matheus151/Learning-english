<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Pro - V39.0 Enhanced</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        /* VARIÁVEIS INTELIGENTES PARA LUZ E MODO NOTURNO */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --custom-card-bg: #ffffff; 
            --text: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --input-bg: #ffffff;
            --line-font-size: 1.15rem; 
            
            /* Cores de Destaque (Claras) */
            --hl-blue-bg: #e0f2fe; --hl-blue-text: #0284c7;
            --hl-red-bg: #fee2e2; --hl-red-text: #dc2626;
            --hl-lilac-bg: #f3e8ff; --hl-lilac-text: #9333ea;
            --hl-bold-text: #000000;
            --play-bg: #eff6ff; --trans-bg: #f0fdf4; --trans-border: #bbf7d0;
        }

        body.dark-mode {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --custom-card-bg: #1e293b; 
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;

            /* Cores de Destaque (Escuras) */
            --hl-blue-bg: rgba(2, 132, 199, 0.2); --hl-blue-text: #7dd3fc;
            --hl-red-bg: rgba(220, 38, 38, 0.2); --hl-red-text: #fca5a5;
            --hl-lilac-bg: rgba(147, 51, 234, 0.2); --hl-lilac-text: #d8b4fe;
            --hl-bold-text: #ffffff;
            --play-bg: rgba(59, 130, 246, 0.15); --trans-bg: rgba(34, 197, 94, 0.1); --trans-border: #166534;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            max-width: 700px;
            margin: 0 auto;
            padding: 15px 12px;
            padding-bottom: 150px;
            font-weight: 400;
            transition: background-color 0.3s, color 0.3s;
        }

        /* SELETOR DE VOZ E GEMINI */
        .voice-config-area, .gemini-config-area {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .voice-config-area label, .gemini-config-area label { color: var(--text); font-weight: 700; margin-bottom: 5px; display: block; }
        select, input[type="password"], textarea, input[type="text"] { 
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); 
            font-size: 16px; color: var(--text); background: var(--input-bg); box-sizing: border-box; font-family: inherit;
        }
        textarea:focus, input:focus, select:focus { outline: none; border-color: var(--primary); }

        /* MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-content { background: var(--card-bg); color: var(--text); padding: 25px; border-radius: 16px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; position: relative; animation: slideUp 0.3s ease-out; border: 1px solid var(--border); }
        .modal-header { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); border: none; background: none; }
        .example-item { background: var(--bg); padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--border); color: var(--text); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Nav */
        .nav-float { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .nav-btn { background: var(--primary); color: white; border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; }
        
        /* Header */
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { margin: 0; color: var(--text); font-weight: 800; font-size: 1.5rem; }
        .font-controls { display: flex; gap: 5px; background: var(--card-bg); padding: 4px; border-radius: 8px; border: 1px solid var(--border); align-items: center; }
        .font-btn { background: var(--bg); border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; color: var(--text); font-size: 0.9rem; display: flex; align-items: center; justify-content: center;}
        
        /* Seletor de Cor */
        .color-picker-wrapper { position: relative; width: 30px; height: 26px; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
        .color-picker-wrapper input[type="color"] { position: absolute; right: -8px; top: -8px; width: 50px; height: 50px; cursor: pointer; border: none; }

        /* Destaques */
        .hl-base { padding: 0 4px; border-radius: 4px; display: inline; line-height: 1.5; }
        .word-interactive { cursor: pointer; transition: 0.2s; border-bottom: 2px dotted transparent; }
        .word-interactive:hover { border-bottom-color: currentColor; filter: brightness(0.8); }
        .hl-blue { background-color: var(--hl-blue-bg); color: var(--hl-blue-text); font-weight: 700; }
        .hl-red { background-color: var(--hl-red-bg); color: var(--hl-red-text); font-weight: 700; }
        .hl-lilac { background-color: var(--hl-lilac-bg); color: var(--hl-lilac-text); font-weight: 700; }
        .hl-bold { font-weight: 900; color: var(--hl-bold-text); border-bottom: 2px solid var(--border); }

        /* Form & Data */
        .input-group { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); margin-bottom: 20px; border: 1px solid var(--border); }
        .input-group h3 { margin-top: 0; color: var(--text); font-size: 1.1rem; margin-bottom: 10px; }
        .input-row { margin-bottom: 12px; }
        button#add-btn { background-color: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; width: 100%; font-size: 1rem; margin-top: 5px; cursor: pointer;}
        .translate-action-btn { background-color: #8b5cf6; color: white; border: none; padding: 8px; border-radius: 6px; font-size: 0.85rem; font-weight: 500; margin-bottom: 10px; cursor: pointer; }
        
        .data-controls { display: flex; gap: 5px; margin-bottom: 20px; background: #334155; padding: 8px; border-radius: 8px; color: white; align-items: center; justify-content: center; flex-wrap: wrap; }
        .data-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 4px; cursor: pointer;}
        .btn-danger { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.5); color: #fca5a5; }
        #file-input { display: none; }
        .import-toggle { text-align: center; margin-bottom: 15px; }
        .import-link { color: var(--text-muted); font-size: 0.85rem; text-decoration: underline; background: none; border: none; cursor: pointer; }
        #import-section { display: none; background: var(--card-bg); padding: 15px; border-radius: 10px; border: 2px dashed var(--border); margin-bottom: 25px; }

        /* Search Bar */
        .search-bar-container { background: var(--card-bg); padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
        .search-input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-size: 0.95rem; }
        .search-input::placeholder { color: var(--text-muted); }
        .search-clear-btn { background: var(--bg); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; cursor: pointer; color: var(--text); font-weight: 600; }
        .no-results { text-align: center; color: var(--text-muted); padding: 20px; font-style: italic; }

        /* Audio Recording */
        .audio-recording-section { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .audio-recording-section h3 { margin-top: 0; color: var(--text); font-size: 1rem; margin-bottom: 10px; }
        .audio-controls { display: flex; gap: 8px; flex-wrap: wrap; }
        .record-btn, .stop-record-btn, .save-audio-btn { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
        .stop-record-btn { background: #ef4444; }
        .save-audio-btn { background: #10b981; }
        .audio-status { color: var(--text-muted); font-size: 0.9rem; margin-top: 8px; }
        .recording-indicator { display: inline-block; width: 10px; height: 10px; background: #ef4444; border-radius: 50%; animation: pulse 1s infinite; margin-right: 5px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* AI Examples Generation */
        .generate-examples-btn { background: #f59e0b; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; margin-top: 10px; width: 100%; }
        .examples-container { background: var(--bg); padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px solid var(--border); }
        .generated-example { background: var(--card-bg); padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #f59e0b; color: var(--text); }
        .generated-example-text { margin-bottom: 8px; font-size: 0.95rem; line-height: 1.4; }
        .example-save-btn { background: #10b981; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }

        /* Cartões */
        #card-container { display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--custom-card-bg); padding: 20px 15px; border-radius: 12px; box-shadow: 0 1px 5px rgba(0,0,0,0.05); border-left-width: 5px; border-left-style: solid; animation: fadeIn 0.4s ease-out; position: relative; scroll-margin-top: 15px; padding-top: 30px; border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);}
        .card.highlight-search { box-shadow: 0 0 0 3px var(--primary), 0 1px 5px rgba(0,0,0,0.1); animation: highlightPulse 0.6s ease-out; }
        @keyframes highlightPulse { 0% { box-shadow: 0 0 0 5px var(--primary), 0 1px 5px rgba(0,0,0,0.1); } 100% { box-shadow: 0 0 0 3px var(--primary), 0 1px 5px rgba(0,0,0,0.1); } }
        .card-number { position: absolute; top: 8px; left: 10px; font-size: 0.75rem; color: var(--text-muted); font-weight: 600; background: var(--bg); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border);}
        
        .line-container { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px dashed var(--border); }
        .line-container:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .line-item { display: flex; align-items: flex-start; gap: 8px; }
        .line-text { font-size: var(--line-font-size); color: var(--text); flex-grow: 1; line-height: 1.4; word-wrap: break-word; margin-top: 2px; }
        .play-mini { background: var(--play-bg); border: none; color: var(--primary); border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 0.8rem; margin-top: 3px; }
        .trans-mini-btn { background: var(--trans-bg); border: 1px solid var(--trans-border); color: #16a34a; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 0.8rem; margin-top: 3px; }
        .line-trans-area { display: none; margin-left: 36px; margin-top: 5px; color: #16a34a; font-size: 0.95rem; font-style: italic; background: var(--trans-bg); padding: 8px 12px; border-radius: 8px; border: 1px dashed var(--trans-border); margin-right: 36px;}

        .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--border); gap: 5px; }
        .controls-group { display: flex; align-items: center; gap: 6px; flex: 1; }
        .play-all-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0 10px; height: 28px; font-size: 0.75rem; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 4px; cursor: pointer;}
        
        /* Botões Rodapé */
        .footer-actions { display: flex; gap: 8px; align-items: center; }
        .action-btn-small { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); border-radius: 6px; width: 32px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem; }
        .action-btn-small.delete { color: #ef4444; }
        .action-btn-small.generate-ai { color: #f59e0b; }
        
        .toggle-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; width: 100%; padding: 8px; font-size: 0.9rem; text-align: left; }
        .toggle-btn:hover { color: var(--text); }
        .details-area { display: none; }
        .details-area.visible { display: block; }
        .translation-text { background: var(--bg); padding: 12px; border-radius: 8px; border-left: 4px solid var(--primary); color: var(--text); font-style: italic; font-size: 0.95rem; line-height: 1.5; }

        /* Edit Mode */
        #edit-mode-0 { display: none; }
        .edit-toolbar { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .color-btn { background: var(--bg); border: 1px solid var(--border); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.8rem; color: var(--text); }
        .btn-smart { background: rgba(59, 130, 246, 0.1); border-color: var(--primary); color: var(--primary); }
        .btn-blue { background: rgba(2, 132, 199, 0.1); border-color: #0284c7; color: #0284c7; }
        .btn-red { background: rgba(220, 38, 38, 0.1); border-color: #dc2626; color: #dc2626; }
        .btn-lilac { background: rgba(147, 51, 234, 0.1); border-color: #9333ea; color: #9333ea; }
        .btn-bold { background: rgba(0, 0, 0, 0.1); border-color: #000; color: #000; }
        .btn-secondary { background: rgba(100, 116, 139, 0.1); border-color: #64748b; color: #64748b; }
        .edit-mode-area { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-family: 'Courier New', monospace; font-size: 0.95rem; resize: vertical; }
        .save-btn { background: #10b981; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; flex: 1; }
        .cancel-btn { background: #ef4444; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; flex: 1; }

        /* Dark Mode Toggle */
        .dark-mode-toggle { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 10px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }

        /* Responsivo */
        @media (max-width: 480px) {
            body { padding: 10px; }
            h1 { font-size: 1.2rem; }
            .header-container { flex-direction: column; gap: 10px; }
            .font-controls { width: 100%; }
            .data-controls { flex-direction: column; }
            .data-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>English Pro</h1>
        <div style="display:flex; gap:8px; align-items:center;">
            <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙</button>
            <div class="font-controls">
                <button class="font-btn" onclick="changeFontSize(-0.1)">A−</button>
                <button class="font-btn" onclick="changeFontSize(0.1)">A+</button>
            </div>
        </div>
    </div>

    <!-- SEARCH BAR -->
    <div class="search-bar-container">
        <input type="text" class="search-input" id="search-input" placeholder="🔍 Pesquisar termo..." onkeyup="handleSearch()">
        <button class="search-clear-btn" onclick="clearSearch()">Limpar</button>
    </div>

    <!-- AUDIO RECORDING SECTION -->
    <div class="audio-recording-section">
        <h3>🎙️ Gravar Termo em Português</h3>
        <div class="audio-controls">
            <button class="record-btn" id="record-btn" onclick="startRecording()">● Gravar</button>
            <button class="stop-record-btn" id="stop-btn" onclick="stopRecording()" style="display:none;">⏹ Parar</button>
            <button class="save-audio-btn" id="save-audio-btn" onclick="saveAudioTerm()" style="display:none;">✓ Salvar Termo</button>
        </div>
        <div class="audio-status" id="audio-status"></div>
    </div>

    <!-- CONFIGURAÇÕES GEMINI -->
    <div class="gemini-config-area">
        <label for="gemini-api-key">🔑 Chave API Gemini (para gerar exemplos):</label>
        <input type="password" id="gemini-api-key" placeholder="Cole sua chave API do Gemini aqui" value="">
        <small style="color: var(--text-muted); display: block; margin-top: 5px;">A chave será salva localmente no seu navegador.</small>
    </div>

    <!-- SELETOR DE VOZ -->
    <div class="voice-config-area">
        <label for="voice-select">🗣️ Voz para Pronúncia:</label>
        <select id="voice-select">
            <option value="">Voz padrão do sistema</option>
        </select>
    </div>

    <!-- FORMULÁRIO DE ADIÇÃO -->
    <div class="input-group">
        <h3>✏️ Adicionar Novo Termo</h3>
        <div class="input-row">
            <label style="color: var(--text); font-weight: 600; margin-bottom: 5px; display: block;">Termo em Inglês:</label>
            <textarea id="input-phrase" rows="4" placeholder="Exemplo:&#10;^to break down^&#10;Example: The company decided to *break down* the project into smaller tasks.&#10;Another example: We need to #break down# the complex problem into manageable parts."></textarea>
        </div>
        <div class="input-row">
            <label style="color: var(--text); font-weight: 600; margin-bottom: 5px; display: block;">Tradução (opcional):</label>
            <textarea id="input-translation" rows="3" placeholder="Tradução em português..."></textarea>
        </div>
        <button id="add-btn" onclick="addCard()">➕ Adicionar Cartão</button>
        <button class="generate-examples-btn" onclick="generateExamplesFromInput()">✨ Gerar Exemplos com IA</button>
    </div>

    <!-- CONTROLES DE DADOS -->
    <div class="data-controls">
        <button class="data-btn" onclick="downloadBackup()">⬇️ Backup</button>
        <button class="data-btn" onclick="document.getElementById('file-input').click()">⬆️ Restaurar</button>
        <input type="file" id="file-input" onchange="restoreBackup(this)">
        <button class="data-btn" onclick="toggleImportArea()">📥 Importar</button>
        <button class="data-btn btn-danger" onclick="clearAllData()">🗑️ Limpar Tudo</button>
    </div>

    <!-- ÁREA DE IMPORTAÇÃO -->
    <div id="import-section">
        <h3 style="margin-top: 0; color: var(--text);">Importar Cartões em Lote</h3>
        <textarea id="import-area" rows="8" placeholder="Cole os cartões aqui (separados por linhas em branco)..." style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-family: inherit; box-sizing: border-box;"></textarea>
        <button class="save-btn" onclick="processBulkImport()" style="width: 100%; margin-top: 10px;">Importar</button>
    </div>

    <!-- CONTAINER DE CARTÕES -->
    <div id="card-container"></div>

    <!-- MODAL DE EXEMPLOS -->
    <div id="example-modal" class="modal-overlay" onclick="closeExampleModal(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="closeExampleModal()">✕</button>
            <div class="modal-header">Exemplos de Uso</div>
            <div id="example-modal-body"></div>
        </div>
    </div>

    <!-- BOTÕES FLUTUANTES DE NAVEGAÇÃO -->
    <div class="nav-float">
        <button class="nav-btn" onclick="scrollToTop()" title="Topo">⬆️</button>
        <button class="nav-btn" onclick="scrollToBottom()" title="Fim">⬇️</button>
    </div>

    <script>
        const STORAGE_KEY = 'englishAppCards';
        let cards = [];
        let currentFontSize = 1.15;
        let mediaRecorder;
        let audioChunks = [];
        let recordedAudioBlob = null;
        let recordedAudioTranscription = null;
        
        const borderColors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4'];

        // --- INICIALIZAÇÃO ---
        window.addEventListener('load', () => {
            loadCards();
            populateVoices();
            loadGeminiApiKey();
            window.speechSynthesis.onvoiceschanged = populateVoices;
        });

        // --- DARK MODE ---
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }
        
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        // --- GEMINI API KEY ---
        function loadGeminiApiKey() {
            const saved = localStorage.getItem('geminiApiKey');
            if (saved) document.getElementById('gemini-api-key').value = saved;
        }

        function saveGeminiApiKey() {
            const key = document.getElementById('gemini-api-key').value.trim();
            if (key) localStorage.setItem('geminiApiKey', key);
        }

        document.getElementById('gemini-api-key').addEventListener('blur', saveGeminiApiKey);

        // --- GRAVAÇÃO DE ÁUDIO ---
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);
                mediaRecorder.onstop = () => {
                    recordedAudioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                };
                
                mediaRecorder.start();
                document.getElementById('record-btn').style.display = 'none';
                document.getElementById('stop-btn').style.display = 'inline-block';
                document.getElementById('audio-status').innerHTML = '<span class="recording-indicator"></span>Gravando...';
            } catch (error) {
                alert('Erro ao acessar microfone: ' + error.message);

        function normalizeFormatting(text) {
            if (!text) return '';
            let lines = text.split('\n');
            lines = lines.map((line, index) => {
                let l = line;
                l = l.replace(/\*\*(.*?)\*\*/g, '^$1^');
                l = l.replace(/__(.*?)__/g, '^$1^');
                l = l.replace(/<b>(.*?)<\/b>/gi, '^$1^');
                if (index === 1) { l = l.replace(/==(.*?)==/g, '*$1*'); } 
                else if (index >= 2) { l = l.replace(/==(.*?)==/g, '#$1#'); } 
                else { l = l.replace(/==(.*?)==/g, '^$1^'); }
                return l;
            });
            return lines.join('\n');
        }

        async function autoSmartMark(index) {
            const textarea = document.getElementById(`edit-phrase-${index}`);
            const btn = document.getElementById(`btn-smart-${index}`);
            let text = textarea.value;
            let lines = text.split('\n').filter(l => l.trim() !== '');
            if (lines.length < 1) return;
            const match = lines[0].match(/\^(.*?)\^/);
            if (!match) { alert("Marque o termo principal em NEGRITO na linha 1 primeiro."); return; }
            const term = match[1].replace(/[.,!?;:]/g, ''); 
            const originalBtnText = btn.innerText;
            btn.innerText = "⏳ Triangulando...";
            btn.disabled = true;
            try {
                let keywords = [term];
                const datamuseRes = await fetch(`https://api.datamuse.com/words?ml=${encodeURIComponent(term)}&max=10`);
                const dmData = await datamuseRes.json();
                dmData.forEach(i => keywords.push(i.word));
                const ptRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(term)}&langpair=en|pt-BR`);
                const ptData = await ptRes.json();
                const words = term.split(/\s+/);
                words.forEach(w => { if(w.length > 3) keywords.push(w); });
                keywords = [...new Set(keywords.map(k => k.toLowerCase()))];
                if (lines.length > 1) lines[1] = smartReplace(lines[1], keywords, '*');
                if (lines.length > 2) lines[2] = smartReplace(lines[2], keywords, '#');
                textarea.value = lines.join('\n\n');
            } catch (error) { alert("Erro na análise."); } 
            finally { btn.innerText = originalBtnText; btn.disabled = false; }
        }

        function smartReplace(sentence, keywords, symbol) {
            let clean = sentence.replace(/[*#~]/g, '');
            keywords.sort((a, b) => b.length - a.length);
            const phraseWords = clean.split(/(\s+|[.,!?;:])/);
            const processed = phraseWords.map(word => {
                const wLow = word.toLowerCase();
                const isMatch = keywords.some(k => (wLow.includes(k) && k.length>3) || (k.includes(wLow) && wLow.length>3));
                if (isMatch && word.trim().length > 0) return `${symbol}${word}${symbol}`;
                return word;
            });
            return processed.join('');
        }

            const t = document.getElementById(`edit-phrase-${i}`);
            const start = t.selectionStart; const end = t.selectionEnd;
            if (start === end) return alert("Selecione texto!");
            t.setRangeText(`${s}${t.value.substring(start, end).replace(/[*#~^]/g, '')}${s}`, start, end, 'select');
        }

        async function fetchTranslation(text) {
            if (!text.trim()) return "";
            try {
                const lines = text.split('\n'); const tr = [];
                for (let l of lines) {
                    if (!l.trim()) { tr.push(""); continue; }
                    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(l.replace(/[*#~^]/g, ''))}&langpair=en|pt-BR`);
                    const d = await res.json();
                    tr.push(d.responseData ? d.responseData.translatedText : "Erro");
                }
                return tr.join('\n');
            } catch (e) { return "Erro conexão"; }
        }
        async function translateForm() { document.getElementById('input-translation').value = await fetchTranslation(document.getElementById('input-phrase').value); }
        async function translateCardNow(i) {
            const res = await fetchTranslation(cards[i].phrase);
            cards[i].translation = res; saveCards(); renderCards();
        }
        
        function addCard() {
            const raw = document.getElementById('input-phrase').value.trim();
            const t = document.getElementById('input-translation').value.trim();
            if(!raw) return alert("Vazio!");
            cards.unshift({ id: Date.now(), phrase: normalizeFormatting(raw), translation: t, accent: 'US' });
            saveCards(); renderCards();
            document.getElementById('input-phrase').value=''; document.getElementById('input-translation').value='';
        }

        function processBulkImport() {
            document.getElementById('import-area').value.split(/\n\s*\n/).forEach(b=>{
                if(b.trim()) cards.unshift({id:Date.now()+Math.random(), phrase:normalizeFormatting(b.trim()), translation:"", accent:'US'});
            });
            saveCards(); renderCards(); toggleImportArea();
        }

        function deleteCard(i) { if(confirm("Excluir cartão?")) { cards.splice(i,1); saveCards(); renderCards(); }}
        function toggleDetails(btn) { btn.nextElementSibling.classList.toggle('visible'); }
        function toggleImportArea() { const d=document.getElementById('import-section'); d.style.display=d.style.display==='block'?'none':'block'; }

        loadCards();
    </script>
</body>
</html>
