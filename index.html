<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Pro - V38.8 Audio Fix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        /* VARIÁVEIS INTELIGENTES PARA LUZ E MODO NOTURNO */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --custom-card-bg: #ffffff; 
            --text: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --input-bg: #ffffff;
            --line-font-size: 1.15rem; 
            
            /* Cores de Destaque (Claras) */
            --hl-blue-bg: #e0f2fe; --hl-blue-text: #0284c7;
            --hl-red-bg: #fee2e2; --hl-red-text: #dc2626;
            --hl-lilac-bg: #f3e8ff; --hl-lilac-text: #9333ea;
            --hl-bold-text: #000000;
            --play-bg: #eff6ff; --trans-bg: #f0fdf4; --trans-border: #bbf7d0;
        }

        body.dark-mode {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --custom-card-bg: #1e293b; 
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;

            /* Cores de Destaque (Escuras) */
            --hl-blue-bg: rgba(2, 132, 199, 0.2); --hl-blue-text: #7dd3fc;
            --hl-red-bg: rgba(220, 38, 38, 0.2); --hl-red-text: #fca5a5;
            --hl-lilac-bg: rgba(147, 51, 234, 0.2); --hl-lilac-text: #d8b4fe;
            --hl-bold-text: #ffffff;
            --play-bg: rgba(59, 130, 246, 0.15); --trans-bg: rgba(34, 197, 94, 0.1); --trans-border: #166534;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            max-width: 700px;
            margin: 0 auto;
            padding: 15px 12px;
            padding-bottom: 150px;
            font-weight: 400;
            transition: background-color 0.3s, color 0.3s;
        }

        /* SELETOR DE VOZ E GEMINI */
        .voice-config-area, .gemini-config-area {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .voice-config-area label, .gemini-config-area label { color: var(--text); font-weight: 700; margin-bottom: 5px; display: block; }
        select, input[type="password"], textarea, input[type="text"] { 
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); 
            font-size: 16px; color: var(--text); background: var(--input-bg); box-sizing: border-box; font-family: inherit;
        }
        textarea:focus, input:focus, select:focus { outline: none; border-color: var(--primary); }

        /* MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-content { background: var(--card-bg); color: var(--text); padding: 25px; border-radius: 16px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; position: relative; animation: slideUp 0.3s ease-out; border: 1px solid var(--border); }
        .modal-header { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); border: none; background: none; }
        .example-item { background: var(--bg); padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--border); color: var(--text); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Nav */
        .nav-float { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .nav-btn { background: var(--primary); color: white; border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; }
        
        /* Header */
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { margin: 0; color: var(--text); font-weight: 800; font-size: 1.5rem; }
        .font-controls { display: flex; gap: 5px; background: var(--card-bg); padding: 4px; border-radius: 8px; border: 1px solid var(--border); align-items: center; }
        .font-btn { background: var(--bg); border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; color: var(--text); font-size: 0.9rem; display: flex; align-items: center; justify-content: center;}
        
        /* Seletor de Cor */
        .color-picker-wrapper { position: relative; width: 30px; height: 26px; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
        .color-picker-wrapper input[type="color"] { position: absolute; right: -8px; top: -8px; width: 50px; height: 50px; cursor: pointer; border: none; }

        /* Destaques */
        .hl-base { padding: 0 4px; border-radius: 4px; display: inline; line-height: 1.5; }
        .word-interactive { cursor: pointer; transition: 0.2s; border-bottom: 2px dotted transparent; }
        .word-interactive:hover { border-bottom-color: currentColor; filter: brightness(0.8); }
        .hl-blue { background-color: var(--hl-blue-bg); color: var(--hl-blue-text); font-weight: 700; }
        .hl-red { background-color: var(--hl-red-bg); color: var(--hl-red-text); font-weight: 700; }
        .hl-lilac { background-color: var(--hl-lilac-bg); color: var(--hl-lilac-text); font-weight: 700; }
        .hl-bold { font-weight: 900; color: var(--hl-bold-text); border-bottom: 2px solid var(--border); }

        /* Form & Data */
        .input-group { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); margin-bottom: 20px; border: 1px solid var(--border); }
        .input-group h3 { margin-top: 0; color: var(--text); font-size: 1.1rem; margin-bottom: 10px; }
        .input-row { margin-bottom: 12px; }
        button#add-btn { background-color: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; width: 100%; font-size: 1rem; margin-top: 5px; cursor: pointer;}
        .translate-action-btn { background-color: #8b5cf6; color: white; border: none; padding: 8px; border-radius: 6px; font-size: 0.85rem; font-weight: 500; margin-bottom: 10px; cursor: pointer; }
        
        .data-controls { display: flex; gap: 5px; margin-bottom: 20px; background: #334155; padding: 8px; border-radius: 8px; color: white; align-items: center; justify-content: center; flex-wrap: wrap; }
        .data-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 4px; cursor: pointer;}
        .btn-danger { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.5); color: #fca5a5; }
        #file-input { display: none; }
        .import-toggle { text-align: center; margin-bottom: 15px; }
        .import-link { color: var(--text-muted); font-size: 0.85rem; text-decoration: underline; background: none; border: none; cursor: pointer; }
        #import-section { display: none; background: var(--card-bg); padding: 15px; border-radius: 10px; border: 2px dashed var(--border); margin-bottom: 25px; }

        /* Cartões */
        #card-container { display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--custom-card-bg); padding: 20px 15px; border-radius: 12px; box-shadow: 0 1px 5px rgba(0,0,0,0.05); border-left-width: 5px; border-left-style: solid; animation: fadeIn 0.4s ease-out; position: relative; scroll-margin-top: 15px; padding-top: 30px; border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);}
        .card-number { position: absolute; top: 8px; left: 10px; font-size: 0.75rem; color: var(--text-muted); font-weight: 600; background: var(--bg); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border);}
        
        .line-container { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px dashed var(--border); }
        .line-container:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .line-item { display: flex; align-items: flex-start; gap: 8px; }
        .line-text { font-size: var(--line-font-size); color: var(--text); flex-grow: 1; line-height: 1.4; word-wrap: break-word; margin-top: 2px; }
        .play-mini { background: var(--play-bg); border: none; color: var(--primary); border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 0.8rem; margin-top: 3px; }
        .trans-mini-btn { background: var(--trans-bg); border: 1px solid var(--trans-border); color: #16a34a; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 0.8rem; margin-top: 3px; }
        .line-trans-area { display: none; margin-left: 36px; margin-top: 5px; color: #16a34a; font-size: 0.95rem; font-style: italic; background: var(--trans-bg); padding: 8px 12px; border-radius: 8px; border: 1px dashed var(--trans-border); margin-right: 36px;}

        .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--border); gap: 5px; }
        .controls-group { display: flex; align-items: center; gap: 6px; flex: 1; }
        .play-all-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0 10px; height: 28px; font-size: 0.75rem; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 4px; cursor: pointer;}
        
        /* Botões Rodapé */
        .footer-actions { display: flex; gap: 8px; align-items: center; }
        .action-btn-small { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); border-radius: 6px; width: 32px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem; }
        .action-btn-small.delete { color: #ef4444; }
        
        .toggle-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; width: 100%; padding: 8px; margin-top: 5px; font-size: 0.8rem; font-weight: 600; }
        .details-area { display: none; background-color: var(--trans-bg); padding: 12px; border-radius: 8px; margin-top: 8px; border: 1px solid var(--trans-border); }
        .details-area.visible { display: block; }
        .translation-text { color: #16a34a; white-space: pre-line; line-height: 1.5; font-size: 0.95rem; }

        .edit-mode-area { background: var(--input-bg); color: var(--text); padding: 10px; border-radius: 8px; border: 2px solid var(--border); margin-bottom: 10px; line-height: 1.6; font-size: 16px; width: 100%; box-sizing: border-box; }
        .edit-toolbar { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
        .color-btn { border: 1px solid var(--border); padding: 6px 10px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 3px; background: var(--bg); color: var(--text); }
        .btn-smart { background: var(--text); color: var(--bg); border: none; }
        .save-btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; flex:1;}
        .cancel-btn { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; flex:1;}

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="example-modal" class="modal-overlay" onclick="closeExampleModal(event)">
        <div class="modal-content">
            <button type="button" class="modal-close" onclick="closeExampleModal()">×</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <div class="nav-float">
        <button type="button" class="nav-btn" onclick="scrollToTop()">⬆</button>
        <button type="button" class="nav-btn" onclick="scrollToBottom()">⬇</button>
    </div>

    <div class="header-container">
        <h1>🇬🇧 English Pro</h1>
        <div class="font-controls">
            <div class="color-picker-wrapper" title="Mudar Cor dos Cards">
                <input type="color" id="card-bg-picker" onchange="changeCardBg(this.value)" value="#ffffff">
            </div>
            <button type="button" class="font-btn" id="theme-toggle-btn" onclick="toggleTheme()" title="Modo Noturno">🌙</button>
            <button type="button" class="font-btn" onclick="changeFontSize(-0.1)">A-</button>
            <button type="button" class="font-btn" onclick="changeFontSize(0.1)">A+</button>
        </div>
    </div>

    <div class="voice-config-area">
        <label>📢 Escolher Voz do Sistema:</label>
        <select id="global-voice-select" onchange="saveGlobalVoice()">
            <option value="">Carregando vozes...</option>
        </select>
    </div>

    <div class="gemini-config-area">
        <label>✨ Chave API Gemini (Exemplos):</label>
        <input type="password" id="gemini-key-input" placeholder="Cole sua chave sk-..." onchange="saveGeminiKey()">
    </div>

    <div class="input-group">
        <h3>Nova Entrada</h3>
        <div class="input-row">
            <label>Frases em Inglês</label>
            <textarea id="input-phrase" rows="4" placeholder="Cole aqui seu texto... Use ==texto== para destacar"></textarea>
        </div>
        <div class="input-row">
            <label>Tradução</label>
            <textarea id="input-translation" rows="4" placeholder="..."></textarea>
        </div>
        <button type="button" class="translate-action-btn" onclick="translateForm()">🪄 Traduzir Campos Acima</button>
        <button type="button" id="add-btn" onclick="addCard()">Salvar Cartão</button>
    </div>

    <div class="data-controls">
        <button type="button" class="data-btn" onclick="downloadBackup()">💾 Backup</button>
        <button type="button" class="data-btn" onclick="document.getElementById('file-input').click()">📂 Restaurar</button>
        <button type="button" class="data-btn btn-danger" onclick="clearAllData()">🗑️ Zerar</button>
        <input type="file" id="file-input" accept=".json" onchange="restoreBackup(this)">
    </div>

    <div class="import-toggle">
        <button type="button" class="import-link" onclick="toggleImportArea()">⬇ Colar Texto Longo</button>
    </div>
    <div id="import-section">
        <textarea id="import-area" rows="6" placeholder="Blocos separados por linha em branco..."></textarea>
        <button type="button" id="add-btn" style="background-color: #64748b;" onclick="processBulkImport()">Processar</button>
    </div>

    <div id="card-container"></div>

    <script>
        let cards = [];
        let voices = [];
        let currentFontSize = 1.15; 
        
        const borderColors = ['#2563eb', '#dc2626', '#16a34a', '#d97706', '#9333ea', '#0891b2'];
        const STORAGE_KEY = 'englishCardsFinalV38_8';

        // --- SISTEMA DE TEMAS E CORES ---
        let isDarkMode = localStorage.getItem('englishAppDarkMode') === 'true';
        if(isDarkMode) {
            document.body.classList.add('dark-mode');
            document.getElementById('theme-toggle-btn').innerText = '☀️';
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            isDarkMode = document.body.classList.contains('dark-mode');
            localStorage.setItem('englishAppDarkMode', isDarkMode);
            document.getElementById('theme-toggle-btn').innerText = isDarkMode ? '☀️' : '🌙';
            
            if(isDarkMode) {
                document.documentElement.style.setProperty('--custom-card-bg', 'var(--card-bg)');
            } else {
                const savedColor = localStorage.getItem('englishAppCardBg');
                if(savedColor) document.documentElement.style.setProperty('--custom-card-bg', savedColor);
            }
        }

        let customCardBg = localStorage.getItem('englishAppCardBg');
        if (customCardBg) {
            document.getElementById('card-bg-picker').value = customCardBg;
            if(!isDarkMode) document.documentElement.style.setProperty('--custom-card-bg', customCardBg);
        }

        function changeCardBg(color) {
            localStorage.setItem('englishAppCardBg', color);
            if(!isDarkMode) {
                document.documentElement.style.setProperty('--custom-card-bg', color);
            } else {
                alert("Cor salva! Ela será aplicada quando você voltar ao Modo Claro.");
            }
        }

        // --- GEMINI API KEY SETUP ---
        let geminiApiKey = localStorage.getItem('englishAppGeminiKey') || '';
        document.getElementById('gemini-key-input').value = geminiApiKey;

        function saveGeminiKey() {
            geminiApiKey = document.getElementById('gemini-key-input').value.trim();
            localStorage.setItem('englishAppGeminiKey', geminiApiKey);
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const index = entry.target.id.replace('card-', '');
                    localStorage.setItem('englishAppLastPos', index);
                }
            });
        }, { threshold: 0.6 });

        // --- SISTEMA DE VOZ MANUAL RESTAURADO ---
        function populateVoiceList() {
            voices = window.speechSynthesis.getVoices();
            const voiceSelect = document.getElementById('global-voice-select');
            
            if (voices.length === 0) return;

            const savedVoiceName = localStorage.getItem('englishAppGlobalVoiceName');
            voiceSelect.innerHTML = '';
            
            voices.sort((a, b) => {
                const aname = a.name.toUpperCase();
                const bname = b.name.toUpperCase();
                if (aname < bname) return -1;
                else if (aname == bname) return 0;
                else return +1;
            });

            voices.forEach((voice) => {
                if(voice.lang.includes('en')) {
                    const option = document.createElement('option');
                    option.textContent = `${voice.name} (${voice.lang})`;
                    option.value = voice.name;
                    
                    if (voice.name === savedVoiceName) {
                        option.selected = true;
                    }
                    voiceSelect.appendChild(option);
                }
            });
        }

        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        function saveGlobalVoice() {
            const select = document.getElementById('global-voice-select');
            localStorage.setItem('englishAppGlobalVoiceName', select.value);
        }

        function cleanTextForAudio(t) {
            if(!t) return '';
            let c = t.replace(/[*#~^]/g, '');
            c = c.replace(/^(Example|Exemple|Another example|Another exemple|Ex|Ex\.|Exemplo)\s*[:.-]?\s*/gi, '');
            return c.trim();
        }

        function speakText(text, index) {
            const clean = cleanTextForAudio(text);
            if (!clean) return;

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                
                // Se o índice for 'modal', assume taxa padrão de 1.0 (evita null pointer)
                const rateElement = document.getElementById(`speed-${index}`);
                const rate = rateElement ? rateElement.value : "1.0";

                const u = new SpeechSynthesisUtterance(clean);
                
                const selectedVoiceName = document.getElementById('global-voice-select').value;
                const selectedVoice = voices.find(v => v.name === selectedVoiceName);

                if (selectedVoice) {
                    u.voice = selectedVoice;
                    u.lang = selectedVoice.lang;
                } else {
                    const fallback = voices.find(v => v.lang.startsWith('en'));
                    if(fallback) u.voice = fallback;
                }

                u.rate = parseFloat(rate);

                // Removida manipulação de innerText (ampulheta) para evitar crash no iOS
                window.speechSynthesis.speak(u);
            }
        }

        function speakAll(index) {
            const clean = cleanTextForAudio(cards[index].phrase).replace(/\n/g, '. ');
            speakText(clean, index);
        }

        // --- GERADOR DE EXEMPLOS GEMINI ---
        let currentExampleTerm = "";
        let currentExampleContext = ""; 

        async function openExampleModal(element) {
            const rawText = element.innerText;
            const term = rawText.replace(/[.,!?;:]/g, '').trim();
            currentExampleTerm = term;
            
            const parentLine = element.closest('.line-text');
            currentExampleContext = parentLine ? parentLine.innerText.replace(/🔈|🌐|👁️/g, '').trim() : "";
            
            const modal = document.getElementById('example-modal');
            const content = document.getElementById('modal-body');
            modal.style.display = 'flex';
            
            if (!geminiApiKey) {
                content.innerHTML = `<div class="modal-header">Aviso</div><div style="padding:10px; color:#ef4444">Por favor, insira a chave da API do Gemini no topo da tela para gerar exemplos.</div>`;
                return;
            }

            content.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-muted)">⏳ Gerando exemplo para: <b>"${term}"</b>...</div>`;
            await fetchAndRenderGeminiExamples(term, currentExampleContext, content, false);
        }

        async function fetchAndRenderGeminiExamples(term, contextText, container, isAppending) {
            try {
                if(isAppending) {
                    const btn = document.getElementById('load-more-btn');
                    if(btn) { btn.innerText = "⏳ Gerando..."; btn.disabled = true; }
                }

                // SOLICITA APENAS 1 EXEMPLO AGORA
                const prompt = `Gere 1 exemplo curto e prático de frase em inglês aplicando a expressão "${term}". 
                Importante: O contexto original onde o usuário encontrou essa expressão foi: "${contextText}". Tente gerar um exemplo que se encaixe nesse MESMO sentido ou contexto de uso.
                Diretriz de Simplicidade: não busque apenas termos básicos demais. Quero, ao invés disso, termos úteis. Quero o equilíbrio.
                Retorne APENAS um JSON válido, sem formatação markdown, estritamente neste formato:
                [
                    {"en": "frase em ingles 1", "pt": "traducao 1"}
                ]`;

                const fetchUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiApiKey}`;
                
                let response = await fetch(fetchUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { temperature: 0.9 }
                    })
                });

                let data = await response.json();

                if (data.error && data.error.code === 404) {
                    const fallbackUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${geminiApiKey}`;
                    response = await fetch(fallbackUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });
                    data = await response.json();
                }

                if (data.error) throw new Error(data.error.message);

                let jsonStr = data.candidates[0].content.parts[0].text;
                jsonStr = jsonStr.replace(/```json/gi, '').replace(/```/gi, '').trim();
                
                const examples = JSON.parse(jsonStr);

                let html = isAppending ? "" : `<div class="modal-header">Exemplos Contextuais: "${term}"</div><div id="examples-list">`;
                
                let baseId = Date.now() + Math.floor(Math.random() * 1000);

                examples.forEach(ex => {
                    baseId++;
                    const transId = `ex-trans-${baseId}`;
                    
                    // ESCAPE BLINDADO PARA INLINE ONCLICK (Impede Safari de abrir tela em branco)
                    const safeEnText = ex.en.replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, ' ');
                    
                    html += `
                        <div class="example-item">
                            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;">
                                <div style="font-weight:600; line-height: 1.4; flex:1;">🇺🇸 ${ex.en}</div>
                                <div style="display:flex; gap:5px; margin-left:10px;">
                                    <button type="button" class="play-mini" onclick="event.preventDefault(); event.stopPropagation(); speakText('${safeEnText}', 'modal')" title="Ouvir">🔈</button>
                                    <button type="button" class="trans-mini-btn" onclick="event.preventDefault(); event.stopPropagation(); toggleExTrans('${transId}')" title="Ocultar/Mostrar Tradução">👁️</button>
                                </div>
                            </div>
                            <div id="${transId}" style="color:#16a34a; font-size:0.9rem; line-height: 1.4; display:block;">🇧🇷 ${ex.pt}</div>
                        </div>
                    `;
                });

                if (isAppending) {
                    const list = document.getElementById('examples-list');
                    list.insertAdjacentHTML('beforeend', html);
                    const btn = document.getElementById('load-more-btn');
                    if(btn){ btn.innerText = "➕ Gerar Mais"; btn.disabled = false; }
                } else {
                    html += `</div><button type="button" id="load-more-btn" onclick="event.preventDefault(); loadMoreExamples()" style="width:100%; background:var(--bg); border:1px solid var(--border); padding:10px; border-radius:8px; color:var(--text); font-weight:bold; margin-top:10px; cursor:pointer;">➕ Gerar Mais</button>`;
                    container.innerHTML = html;
                }
            } catch (e) {
                if (isAppending) {
                     const btn = document.getElementById('load-more-btn');
                     if(btn){ btn.innerText = "❌ Erro. Tentar de novo"; btn.disabled = false; }
                } else {
                     container.innerHTML = `<div class="modal-header">Ops!</div><div style="padding:10px; color:#ef4444">Erro ao gerar exemplos: ${e.message}</div>`;
                }
            }
        }

        function loadMoreExamples() {
            const content = document.getElementById('modal-body');
            fetchAndRenderGeminiExamples(currentExampleTerm, currentExampleContext, content, true);
        }

        function toggleExTrans(id) {
            const el = document.getElementById(id);
            if(el) {
                el.style.display = el.style.display === 'none' ? 'block' : 'none';
            }
        }

        function closeExampleModal(e) {
            if (e && e.target !== document.getElementById('example-modal') && e.target !== document.querySelector('.modal-close')) return;
            document.getElementById('example-modal').style.display = 'none';
        }

        // --- TRADUÇÃO DE LINHA ---
        async function toggleLineTrans(cardIndex, lineIndex, text) {
            const transDiv = document.getElementById(`line-trans-${cardIndex}-${lineIndex}`);
            if (transDiv.style.display === 'block') {
                transDiv.style.display = 'none';
                return;
            }
            
            transDiv.style.display = 'block'; 
            
            if (transDiv.innerText === "") {
                transDiv.innerText = "⏳ Traduzindo linha...";
                const res = await fetchTranslation(text);
                transDiv.innerText = res;
            }
        }

        // --- SOLUÇÃO PARA CLICAR NA EXPRESSÃO INTEIRA ---
        function formatHighlight(t) {
            if(!t) return '';
            
            const wrap = (txt, cls) => `<span class="hl-base ${cls} word-interactive" onclick="event.preventDefault(); event.stopPropagation(); openExampleModal(this)">${txt}</span>`;
            
            let h = t.replace(/\*(.*?)\*/g, (m,p1) => wrap(p1, 'hl-blue'));
            h = h.replace(/#(.*?)#/g, (m,p1) => wrap(p1, 'hl-red'));
            h = h.replace(/~(.*?)~/g, (m,p1) => wrap(p1, 'hl-lilac'));
            h = h.replace(/\^(.*?)\^/g, (m,p1) => wrap(p1, 'hl-bold'));
            return h;
        }

        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function scrollToBottom() { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }

        function changeFontSize(delta) {
            currentFontSize += delta;
            if (currentFontSize < 0.8) currentFontSize = 0.8;
            if (currentFontSize > 2.5) currentFontSize = 2.5;
            document.documentElement.style.setProperty('--line-font-size', `${currentFontSize}rem`);
            localStorage.setItem('englishAppFontSize', currentFontSize);
        }

        function downloadBackup() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(cards));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "backup_ingles_" + new Date().toISOString().slice(0,10) + ".json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function restoreBackup(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        if(confirm(`Encontrados ${data.length} cartões. Substituir?`)) {
                            cards = data; saveCards(); renderCards(); alert("Restaurado!");
                        }
                    } else { alert("Arquivo inválido."); }
                } catch(err) { alert("Erro ao ler arquivo."); }
            };
            reader.readAsText(file);
        }

        function clearAllData() {
            if(confirm("Apagar TUDO?")) {
                if(confirm("Confirmação final?")) {
                    localStorage.clear(); cards = []; currentFontSize = 1.15; renderCards(); alert("Zerado.");
                }
            }
        }

        function normalizeFormatting(text) {
            if (!text) return '';
            let lines = text.split('\n');
            lines = lines.map((line, index) => {
                let l = line;
                l = l.replace(/\*\*(.*?)\*\*/g, '^$1^');
                l = l.replace(/__(.*?)__/g, '^$1^');
                l = l.replace(/<b>(.*?)<\/b>/gi, '^$1^');
                if (index === 1) { l = l.replace(/==(.*?)==/g, '*$1*'); } 
                else if (index >= 2) { l = l.replace(/==(.*?)==/g, '#$1#'); } 
                else { l = l.replace(/==(.*?)==/g, '^$1^'); }
                return l;
            });
            return lines.join('\n');
        }

        function loadCards() {
            const savedFont = localStorage.getItem('englishAppFontSize');
            if (savedFont) {
                currentFontSize = parseFloat(savedFont);
                document.documentElement.style.setProperty('--line-font-size', `${currentFontSize}rem`);
            }
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) { cards = JSON.parse(saved); } 
            else { cards = [{ id: 1, phrase: "Use ==bold== here.\nExample: My ==car== is blue.\nAnother example: This is ==urgent==.", translation: "Exemplo", accent: 'US' }]; }
            renderCards();
            setTimeout(() => {
                const lastPos = localStorage.getItem('englishAppLastPos');
                if (lastPos) {
                    const el = document.getElementById(`card-${lastPos}`);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 500);
        }
        function saveCards() { localStorage.setItem(STORAGE_KEY, JSON.stringify(cards)); }

        function renderCards() {
            const container = document.getElementById('card-container');
            container.innerHTML = '';
            
            cards.forEach((card, index) => {
                const el = document.createElement('div');
                el.className = 'card';
                el.id = `card-${index}`;
                observer.observe(el);

                const color = borderColors[index % borderColors.length];
                el.style.borderLeftColor = color;

                const lines = card.phrase.split('\n');
                let phrasesHtml = '';
                
                lines.forEach((line, lineIndex) => {
                    if(line.trim() === "") return;
                    const display = formatHighlight(line);
                    const clean = cleanTextForAudio(line);
                    const safeCleanText = clean.replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, ' ');
                    
                    phrasesHtml += `
                        <div class="line-container">
                            <div class="line-item">
                                <button type="button" class="play-mini" onclick="event.preventDefault(); event.stopPropagation(); speakText('${safeCleanText}', ${index})">🔈</button>
                                <div class="line-text">${display}</div>
                                <button type="button" class="trans-mini-btn" onclick="event.preventDefault(); event.stopPropagation(); toggleLineTrans(${index}, ${lineIndex}, '${safeCleanText}')" title="Traduzir Linha">🌐</button>
                            </div>
                            <div id="line-trans-${index}-${lineIndex}" class="line-trans-area"></div>
                        </div>
                    `;
                });

                let transContent = card.translation 
                    ? `<div class="translation-text">${card.translation}</div>`
                    : `<button type="button" class="translate-action-btn" onclick="event.preventDefault(); translateCardNow(${index})" style="width:100%">✨ Traduzir Agora</button><div id="trans-text-${index}" class="translation-text"></div>`;

                el.innerHTML = `
                    <div class="card-number">#${index + 1}</div>
                    
                    <div id="view-mode-${index}">
                        <div class="phrases-area">${phrasesHtml}</div>
                        <div class="card-footer">
                            <div class="controls-group">
                                <select id="speed-${index}" style="width:auto; padding: 4px; height: 30px; font-size:0.8rem; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); border-radius: 5px;">
                                    <option value="0.8">0.8x</option>
                                    <option value="1" selected>1.0x</option>
                                    <option value="1.1">1.1x</option>
                                    <option value="1.2">1.2x</option>
                                    <option value="1.5">1.5x</option>
                                </select>
                                <button type="button" class="play-all-btn" onclick="event.preventDefault(); speakAll(${index})">▶ Ouvir</button>
                            </div>
                            <div class="footer-actions">
                                <button type="button" class="action-btn-small" onclick="event.preventDefault(); enableEditMode(${index})" title="Editar">✏️</button>
                                <button type="button" class="action-btn-small delete" onclick="event.preventDefault(); deleteCard(${index})" title="Excluir">🗑️</button>
                            </div>
                        </div>
                        <button type="button" class="toggle-btn" onclick="event.preventDefault(); toggleDetails(this)">👁️ Ver Tradução Geral</button>
                        <div class="details-area">${transContent}</div>
                    </div>

                    <div id="edit-mode-${index}" style="display:none;">
                        <div class="edit-toolbar">
                            <button type="button" class="color-btn btn-smart" id="btn-smart-${index}" onclick="event.preventDefault(); autoSmartMark(${index})">🔗 Auto Smart</button>
                            <span style="color:var(--border)">|</span>
                            <button type="button" class="color-btn btn-blue" onclick="event.preventDefault(); applyHighlight(${index}, '*')">Blue</button>
                            <button type="button" class="color-btn btn-red" onclick="event.preventDefault(); applyHighlight(${index}, '#')">Red</button>
                            <button type="button" class="color-btn btn-lilac" onclick="event.preventDefault(); applyHighlight(${index}, '~')">Lilac</button>
                            <button type="button" class="color-btn btn-bold" onclick="event.preventDefault(); applyHighlight(${index}, '^')">Bold</button>
                        </div>
                        <textarea id="edit-phrase-${index}" rows="6" class="edit-mode-area"></textarea>
                        <div style="display:flex; gap:10px; margin-bottom:10px;">
                            <button type="button" class="color-btn btn-secondary" onclick="event.preventDefault(); toggleTransEdit(${index})" style="flex:1;">📝 Ver Tradução</button>
                            <button type="button" class="color-btn btn-secondary" onclick="event.preventDefault(); updateTranslationInEdit(${index})" style="flex:1;">✨ Auto Traduzir</button>
                        </div>
                        <div id="edit-trans-wrapper-${index}" style="display:none;">
                            <textarea id="edit-trans-${index}" rows="5" class="edit-mode-area"></textarea>
                        </div>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button type="button" class="save-btn" onclick="event.preventDefault(); saveEdit(${index})">Salvar</button>
                            <button type="button" class="cancel-btn" onclick="event.preventDefault(); cancelEdit(${index})">Cancelar</button>
                        </div>
                    </div>
                `;
                container.appendChild(el);
            });
        }

        function enableEditMode(i) {
            document.getElementById(`view-mode-${i}`).style.display='none';
            document.getElementById(`edit-mode-${i}`).style.display='block';
            const pArea = document.getElementById(`edit-phrase-${i}`);
            const tArea = document.getElementById(`edit-trans-${i}`);
            document.getElementById(`edit-trans-wrapper-${i}`).style.display = 'none';
            pArea.value = cards[i].phrase.split('\n').filter(l=>l.trim()).join('\n\n');
            tArea.value = cards[i].translation.split('\n').filter(l=>l.trim()).join('\n\n');
        }

        function toggleTransEdit(index) {
            const wrapper = document.getElementById(`edit-trans-wrapper-${index}`);
            wrapper.style.display = wrapper.style.display === 'none' ? 'block' : 'none';
        }

        async function updateTranslationInEdit(index) {
            const phraseText = document.getElementById(`edit-phrase-${index}`).value;
            const transArea = document.getElementById(`edit-trans-${index}`);
            document.getElementById(`edit-trans-wrapper-${index}`).style.display = 'block'; 
            transArea.value = "Traduzindo...";
            transArea.value = await fetchTranslation(phraseText);
        }

        function cancelEdit(i) { renderCards(); }
        function saveEdit(i) {
            cards[i].phrase = normalizeFormatting(document.getElementById(`edit-phrase-${i}`).value); 
            cards[i].translation = document.getElementById(`edit-trans-${i}`).value;
            saveCards(); renderCards();
        }
        
        async function autoSmartMark(index) {
            const textarea = document.getElementById(`edit-phrase-${index}`);
            const btn = document.getElementById(`btn-smart-${index}`);
            let text = textarea.value;
            let lines = text.split('\n').filter(l => l.trim() !== '');
            if (lines.length < 1) return;
            const match = lines[0].match(/\^(.*?)\^/);
            if (!match) { alert("Marque o termo principal em NEGRITO na linha 1 primeiro."); return; }
            const term = match[1].replace(/[.,!?;:]/g, ''); 
            const originalBtnText = btn.innerText;
            btn.innerText = "⏳ Triangulando...";
            btn.disabled = true;
            try {
                let keywords = [term];
                const datamuseRes = await fetch(`https://api.datamuse.com/words?ml=${encodeURIComponent(term)}&max=10`);
                const dmData = await datamuseRes.json();
                dmData.forEach(i => keywords.push(i.word));
                const ptRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(term)}&langpair=en|pt-BR`);
                const ptData = await ptRes.json();
                const words = term.split(/\s+/);
                words.forEach(w => { if(w.length > 3) keywords.push(w); });
                keywords = [...new Set(keywords.map(k => k.toLowerCase()))];
                if (lines.length > 1) lines[1] = smartReplace(lines[1], keywords, '*');
                if (lines.length > 2) lines[2] = smartReplace(lines[2], keywords, '#');
                textarea.value = lines.join('\n\n');
            } catch (error) { alert("Erro na análise."); } 
            finally { btn.innerText = originalBtnText; btn.disabled = false; }
        }

        function smartReplace(sentence, keywords, symbol) {
            let clean = sentence.replace(/[*#~]/g, '');
            keywords.sort((a, b) => b.length - a.length);
            const phraseWords = clean.split(/(\s+|[.,!?;:])/);
            const processed = phraseWords.map(word => {
                const wLow = word.toLowerCase();
                const isMatch = keywords.some(k => (wLow.includes(k) && k.length>3) || (k.includes(wLow) && wLow.length>3));
                if (isMatch && word.trim().length > 0) return `${symbol}${word}${symbol}`;
                return word;
            });
            return processed.join('');
        }

        function applyHighlight(i, s) {
            const t = document.getElementById(`edit-phrase-${i}`);
            const start = t.selectionStart; const end = t.selectionEnd;
            if (start === end) return alert("Selecione texto!");
            t.setRangeText(`${s}${t.value.substring(start, end).replace(/[*#~^]/g, '')}${s}`, start, end, 'select');
        }

        async function fetchTranslation(text) {
            if (!text.trim()) return "";
            try {
                const lines = text.split('\n'); const tr = [];
                for (let l of lines) {
                    if (!l.trim()) { tr.push(""); continue; }
                    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(l.replace(/[*#~^]/g, ''))}&langpair=en|pt-BR`);
                    const d = await res.json();
                    tr.push(d.responseData ? d.responseData.translatedText : "Erro");
                }
                return tr.join('\n');
            } catch (e) { return "Erro conexão"; }
        }
        async function translateForm() { document.getElementById('input-translation').value = await fetchTranslation(document.getElementById('input-phrase').value); }
        async function translateCardNow(i) {
            const res = await fetchTranslation(cards[i].phrase);
            cards[i].translation = res; saveCards(); renderCards();
        }
        
        function addCard() {
            const raw = document.getElementById('input-phrase').value.trim();
            const t = document.getElementById('input-translation').value.trim();
            if(!raw) return alert("Vazio!");
            cards.unshift({ id: Date.now(), phrase: normalizeFormatting(raw), translation: t, accent: 'US' });
            saveCards(); renderCards();
            document.getElementById('input-phrase').value=''; document.getElementById('input-translation').value='';
        }

        function processBulkImport() {
            document.getElementById('import-area').value.split(/\n\s*\n/).forEach(b=>{
                if(b.trim()) cards.unshift({id:Date.now()+Math.random(), phrase:normalizeFormatting(b.trim()), translation:"", accent:'US'});
            });
            saveCards(); renderCards(); toggleImportArea();
        }

        function deleteCard(i) { if(confirm("Excluir cartão?")) { cards.splice(i,1); saveCards(); renderCards(); }}
        function toggleDetails(btn) { btn.nextElementSibling.classList.toggle('visible'); }
        function toggleImportArea() { const d=document.getElementById('import-section'); d.style.display=d.style.display==='block'?'none':'block'; }

        loadCards();
    </script>
</body>
</html>
